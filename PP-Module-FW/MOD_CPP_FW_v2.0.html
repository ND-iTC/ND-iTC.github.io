<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PP-Module for Stateful Traffic Filter Firewalls v2.0</title>
<script src="https://cdn.jsdelivr.net/npm/asciidoctor@3.0.4/dist/browser/asciidoctor.min.js"></script>
<style>
body { font-family: "Noto Serif", "DejaVu Serif", serif; margin: 2em auto; max-width: 62.5em; padding: 0 1em; color: rgba(0,0,0,.8); }
#loading { font-family: sans-serif; color: #666; text-align: center; padding: 3em; font-size: 1.2em; }
#error { font-family: sans-serif; color: #c00; text-align: center; padding: 3em; font-size: 1.1em; }
</style>
</head>
<body>
<div id="loading">Loading PP-Module for Stateful Traffic Filter Firewalls v2.0&hellip;</div>
<div id="error" style="display:none;"></div>
<div id="content"></div>
<script>
(async function() {
  try {
    const response = await fetch('https://raw.githubusercontent.com/ND-iTC/PP-Module-FW/Development/MOD_CPP_FW_v2.0.adoc');
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const adocText = await response.text();
    document.getElementById('loading').style.display = 'none';
    const asciidoctor = Asciidoctor();
    const html = asciidoctor.convert(adocText, {
      safe: 'safe',
      attributes: { 'showtitle': '', 'toc': 'left', 'toclevels': '3' }
    });
    document.getElementById('content').innerHTML = html;
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = 'Error loading document: ' + e.message + '. Please view the source at https://github.com/ND-iTC/PP-Module-FW/blob/Development/MOD_CPP_FW_v2.0.adoc';
  }
})();
</script>
</body>
</html>
